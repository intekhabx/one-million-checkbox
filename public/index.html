<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONE MILLION CHECKBOX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>ONE MILLION CHECKBOX</h1>
  <div class="sub-heading">
    <strong>Active Users <span id="active-user">0</span></strong>
    <strong>Total Checked <span id="total-checked">0</span></strong>
  </div>
  <div class="container">
    <!-- here all checkbox will insert -->
    <div id="watcher"><!-- last div to watch the checkbox (it always present in last) --></div>
  </div>

  <div id="sign">
  <span class="inner">
    made with <span class="heart">❤️</span>by
    <a href="https://github.com/intekhabx">intekhabx</a>
  </span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // const socket = io()
    const socket = io('http://localhost:8000');

    const container = document.querySelector('.container');
    const totalCheckedTag = document.getElementById('total-checked');
    const watcher = document.getElementById('watcher')
    const TOTAL = 10_000_000;
    const BATCH_SIZE = 2000; //2000 checkbox load hoga one batch me
    let currentIndex = 0; //kitna checkbox render hua hai
    const alreadyChecked = [];

    function renderBatch(){
      if(currentIndex >= TOTAL){
        observer.unobserve(watcher) //observe krna stop krdo
        return;
      }

      const totalCheckboxFragment = document.createDocumentFragment();

      for(let i= currentIndex; i< currentIndex + BATCH_SIZE && i < TOTAL; i++){
        const input = document.createElement('input');
        input.setAttribute('id', i+1);
        input.type = "checkbox";
        totalCheckboxFragment.appendChild(input);
      }

      container.insertBefore(totalCheckboxFragment, watcher); //container ke andar watcher tag se pehle insert karo
      currentIndex += BATCH_SIZE; // currindex ko batch size se update kro
    }

      container.addEventListener("click", (e)=>{
        if(e.target.type === "checkbox"){
          socket.emit("user:click", {id: e.target.id, isChecked: e.target.checked});
        }
      })


    //observer code
    const observer = new IntersectionObserver((entries)=>{ //to observe the watcher
      entries.forEach((entry)=>{
        if(entry.isIntersecting){ //watcher jab viewport me aaye
          renderBatch() // render new batch
          for (const id of alreadyChecked) {
            if(id <= currentIndex){
              document.getElementById(id).checked = true;
            }
          }
        }
      })
    }, {rootMargin: '200px'}) //watcher dikhne se 200px pehle render start hoga
    
    renderBatch(); // render batch first time without start the observing
    observer.observe(watcher); //observe starts 

    socket.on('server:update', (data)=>{
      const {isChecked, id} = data;

      const box = document.getElementById(id);
      if(!box){
        if(isChecked){
          alreadyChecked.push(id);
        }
        else{
          const index = alreadyChecked.indexOf(id);
          if(index !== -1) alreadyChecked.splice(index, 1);
        }
      }
      else{
        box.checked = isChecked;
      }
      totalCheckedTag.textContent = Number(totalCheckedTag.textContent) + (isChecked ? 1 : -1);
    })



    // when new user connect (checked box marked as checked)
    async function fetchCheckedBox(){
      const res = await fetch(`http://localhost:8000/checked-box`);
      const data = await res.json();
      // console.log(data);

      for(let i=0; i<data.length; i++){
        const id = Number(data[i]);
        alreadyChecked.push(id);
        if(id <= currentIndex){
          document.getElementById(id).checked = 'checked';
        }
      }

      //total-checked
      totalCheckedTag.textContent = data.length;
    };
    fetchCheckedBox();


    //for active user
    socket.on('server:active', (data)=>{
      document.getElementById('active-user').innerText = data;
    })

  </script>
</body>
</html>
